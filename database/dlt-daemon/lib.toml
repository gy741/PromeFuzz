
[dlt-daemon]

language = "c"

compile_commands_path = "database/dlt-daemon/latest/build_asan/compile_commands.json"

header_paths = ["database/dlt-daemon/latest/code/include/dlt"]

document_paths = [
    "database/dlt-daemon/latest/code/README.md",
    "database/dlt-daemon/latest/bin_asan/share/doc",
    "database/dlt-daemon/latest/code/doc"
]
document_has_api_usage = true

output_path = "out/dlt-daemon"
driver_build_args = [
    "database/dlt-daemon/latest/bin_asan/lib/static/libdlt.a",
    "-lpthread",
    "-I/promefuzz/database/dlt-daemon/latest/code/include"
]

consumer_case_paths = [
    "database/dlt-daemon/latest/code/tests",
    "database/dlt-daemon/latest/code/examples"
]
