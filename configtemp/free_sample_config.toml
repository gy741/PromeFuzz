# =====================================================================
# Preprocessor
# =====================================================================
[preprocessor]
run_dummydriver_test = false
dump_relevance_as_csv = false
dump_call_graph = false

# =====================================================================
# Comprehender
# =====================================================================
[comprehender]
embedding_llm = "local_embed"
comprehension_llm = "openrouter_owl"
function_batch_size = 24

# =====================================================================
# Generator
# =====================================================================
[generator]
generation_llm = "openrouter_owl"
use_consumer_case_count = 30

# =====================================================================
# Analyzer / Sanitizer
# =====================================================================
[analyzer]
analysis_llm = "openrouter_nvidia_nemotron_reasoner"

# =====================================================================
# LLM CONFIG
# =====================================================================
[llm]
default_llm = "openrouter_owl"

# =========================================================================================
# LLM SETTINGS
# =========================================================================================
[llm.local_embed]
llm_type = "ollama"
host = "172.17.0.1"
port = 11434
model = "mxbai-embed-large"

[llm.openrouter_owl]
llm_type = "openai"
api_base = "https://openrouter.ai/api/v1"
base_url = "https://openrouter.ai/api/v1"
openai_api_base = "https://openrouter.ai/api/v1"
model = "openrouter/owl-alpha"
api_key = "sk-or-v1-key"

[llm.openrouter_nvidia_nemotron_reasoner]
llm_type = "openai-reasoning"
api_base = "https://openrouter.ai/api/v1"
base_url = "https://openrouter.ai/api/v1"
openai_api_base = "https://openrouter.ai/api/v1"
model = "nvidia/nemotron-3-ultra-550b-a55b:free"
api_key = "sk-or-v1-key"

# =====================================================================
# Binary path
# =====================================================================
[bin]
preprocessor = "{PROMEFUZZ_PATH}/build/bin/preprocessor"
cgprocessor = "{PROMEFUZZ_PATH}/build/bin/cgprocessor"
